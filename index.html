<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 390px;
      padding: 12px;
      font-family: sans-serif;
      margin: 0;
      position: relative;
      box-sizing: border-box;
    }

    /* Overlay che toàn màn hình */
    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #27ae60;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Status message */
    #status {
      font-size: 12px;
      color: #555;
      text-align: center;
      background: #f5f5f5;
      border-radius: 6px;
      padding: 6px 10px;
      margin-bottom: 10px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: pre-line;
      line-height: 1.5;
    }

    /* Action buttons row */
    .action-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn-water {
      flex: 1;
      padding: 10px 6px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
    }

    .btn-water:hover {
      background: #219a52;
    }

    .btn-harvest {
      flex: 1;
      padding: 10px 6px;
      background: #f39c12;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
    }

    .btn-harvest:hover {
      background: #d68910;
    }

    .btn-auto {
      flex: 1;
      padding: 10px 6px;
      background: #2980b9;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
    }

    .btn-auto:hover {
      background: #2471a3;
    }

    .btn-reload {
      flex: 0 0 auto;
      padding: 10px 12px;
      background: #ecf0f1;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
    }

    .btn-reload:hover {
      background: #dce1e2;
    }

    /* Seed buttons section */
    #seedButtons {
      padding-top: 10px;
      border-top: 1px solid #ddd;
    }

    #seedButtons h3 {
      font-size: 12px;
      margin: 0 0 8px 0;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .seed-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .btn-seed {
      padding: 9px 4px;
      background: #9b59b6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 11px;
      text-align: center;
      line-height: 1.3;
      word-break: break-word;
    }

    .btn-seed:hover {
      background: #8e44ad;
    }
  </style>
</head>

<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p style="font-size: 12px;">Scanning cookies...</p>
  </div>

  <div id="status">Loading ...</div>

  <div class="action-row">
    <button id="autoBtn" class="btn-auto">⚡ Auto</button>
    <button id="waterBtn" class="btn-water">💧 Water</button>
    <button id="harvestBtn" class="btn-harvest">🌾 Harvest</button>
    <button id="reloadBtn" class="btn-reload">🔄</button>
  </div>

  <div id="seedButtons">
    <h3>🌱 Plant Seeds</h3>
    <div class="seed-grid">
      <!-- Buttons will be dynamically created here -->
    </div>
  </div>

  <script src="scripts/init.js"></script>
  <script src="scripts/actions.js"></script>
</body>

</html>
