<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: sans-serif;
      margin: 0;
      position: relative;
    }

    /* Overlay che toàn màn hình */
    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #27ae60;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .btn-water {
      width: 100%;
      padding: 12px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .btn-harvest {
      width: 100%;
      padding: 12px;
      background: #f39c12;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    #seedButtons {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #ddd;
    }

    #seedButtons h3 {
      font-size: 13px;
      margin: 0 0 10px 0;
      color: #333;
    }

    .btn-seed {
      width: 100%;
      padding: 10px;
      background: #9b59b6;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .btn-seed:hover {
      background: #8e44ad;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p style="font-size: 12px;">Scanning cookies...</p>
  </div>

  <button id="waterBtn" class="btn-water">Water Plants 💧</button>
  <button id="harvestBtn" class="btn-harvest">Harvest 🌾</button>

  <div id="seedButtons">
    <h3>Plant Seeds 🌱</h3>
    <!-- Buttons will be dynamically created here -->
  </div>

  <div id="status">Ready!</div>

  <script src="scripts/init.js"></script>
  <script src="scripts/actions.js"></script>
</body>

</html>
